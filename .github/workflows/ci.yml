name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Lint, Typecheck, Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build

  database:
    name: Migrations + RLS (pgTAP)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Start Supabase (Docker) e aplicar migrations + seed
        run: supabase start
      - name: Reset (aplica migrations limpas)
        run: supabase db reset
      - name: Rodar testes RLS (pgTAP)
        run: supabase test db
